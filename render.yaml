services:
  - type: web
    name: srme-api
    plan: free
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: srme-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: srme-redis
          property: connectionString

  - type: redis
    name: srme-redis
    plan: free
    ipAllowList: []

databases:
  - name: srme-db
    databaseName: srme_db
    user: srme_user
    plan: free
