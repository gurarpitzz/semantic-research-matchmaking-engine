services:
  - type: web
    name: srme-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: srme-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: srme-redis
          property: connectionString

  - type: worker
    name: srme-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A backend.workers.tasks worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: srme-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: srme-redis
          property: connectionString

databases:
  - name: srme-db
    databaseName: srme_db
    user: srme_user
    plan: starter

  - type: redis
    name: srme-redis
    plan: free
